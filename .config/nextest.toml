nextest-version = { recommended = "0.9.100" }

[profile.default]
fail-fast = false
# Default runs keep the greenfield HA binaries out of the normal gate.
default-filter = '''
not (kind(test) & binary(ha_*))
'''
slow-timeout = { period = "120s", terminate-after = 1, grace-period = "15s" }

[profile.default.junit]
path = "junit.xml"
store-success-output = true
store-failure-output = true

[profile.ultra-long]
fail-fast = false
# The long-running greenfield HA binaries live behind `make test-long` because they
# take longer. Keep routing them by durable binary name rather than exact test lists.
# These binaries are expected to be parallel-safe. If a scenario only passes in serial,
# that scenario is buggy and must be fixed instead of protected by serialization.
default-filter = '''
kind(test) & binary(ha_*)
'''
test-threads = 32
slow-timeout = { period = "1800s", terminate-after = 1, grace-period = "30s" }

[profile.ultra-long.junit]
path = "junit.xml"
store-success-output = true
store-failure-output = true
