experimental = ["setup-scripts"]

nextest-version = { recommended = "0.9.100" }

[scripts.setup.ha-cucumber-image]
command = { command-line = "tools/nextest/setup-ha-cucumber-image.sh", relative-to = "workspace-root" }
slow-timeout = { period = "1800s", terminate-after = 1, grace-period = "30s" }
capture-stdout = true
capture-stderr = true

[profile.default]
fail-fast = false
# Default runs keep the greenfield HA test binary out of the normal gate.
default-filter = '''
not (kind(test) & binary(ha) & test(/^ha_/))
'''
slow-timeout = { period = "120s", terminate-after = 1, grace-period = "15s" }

[profile.default.junit]
path = "junit.xml"
store-success-output = true
store-failure-output = true

[profile.ultra-long]
fail-fast = false
# The long-running greenfield HA tests live behind `make test-long` because they
# take longer. Keep routing them by durable binary name rather than exact test lists.
# These binaries are expected to be parallel-safe. If a scenario only passes in serial,
# that scenario is buggy and must be fixed instead of protected by serialization.
# The HA harness spins up full Docker Compose topologies per scenario, so keep
# enough parallelism to exercise concurrency without exhausting Docker's address
# pools during the gate.
default-filter = '''
kind(test) & binary(ha) & test(/^ha_/)
'''
test-threads = 4
slow-timeout = { period = "1800s", terminate-after = 1, grace-period = "30s" }

[[profile.ultra-long.scripts]]
filter = '''
kind(test) & binary(ha) & test(/^ha_/)
'''
setup = "ha-cucumber-image"

[profile.ultra-long.junit]
path = "junit.xml"
store-success-output = true
store-failure-output = true
