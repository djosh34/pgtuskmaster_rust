[package]
name = "pgtuskmaster_rust"
version = "0.1.0"
edition = "2021"

[features]
default = []
test-harness = []

[dependencies]
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.12"
tokio = { version = "1.44.1", features = ["sync", "rt", "macros", "time", "process", "net"] }
tokio-postgres = "0.7.13"
toml = "0.8.20"
