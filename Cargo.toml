[package]
name = "pgtuskmaster_rust"
version = "0.1.0"
edition = "2021"

[features]
default = []
test-harness = []

[dependencies]
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.140"
thiserror = "2.0.12"
tokio = { version = "1.44.1", features = ["sync", "rt", "macros", "time", "process", "net", "io-util"] }
tokio-postgres = "0.7.13"
toml = "0.8.20"
httparse = "1.10.1"
etcd-client = "0.14.1"
rustls = "0.23.28"
tokio-rustls = "0.26.4"

[dev-dependencies]
rcgen = "0.14.5"
