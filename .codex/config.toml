

model_reasoning_summary = "detailed"
model_verbosity = "high"
model_supports_reasoning_summaries = true

[features]
multi_agent = true

[profiles.spark]
model = "gpt-5.3-codex-spark"
model_reasoning_effort = "high"
model_reasoning_summary = "none"
model_supports_reasoning_summaries = false

[profiles.normal_high]
model = "gpt-5.2"
model_reasoning_effort = "high"

[profiles.normal_medium]
model = "gpt-5.3-codex"
model_reasoning_effort = "medium"

[profiles.deep_review]
model = "gpt-5.2"
model_reasoning_effort = "high"


[otel]
# Codex telemetry -> OpenObserve via OTLP/HTTP JSON
environment = "pgtuskmaster_rust"
log_user_prompt = true

exporter = { otlp-grpc = { endpoint = "http://10.0.4.30:5081", headers = { "Authorization" = "Basic ZXhhbXBsZUBlbWFpbC5jb206OXdPdzNrSVBrYzRHc0Nrcw==", "stream-name" = "pgtuskmaster_rust", "organization" =  "default" } } }


[agents]
max_threads = 50
max_depth = 1

[agents.explore_spark]
description = "ultra fast explorer"
config_file = "agents/spark_review.toml"
