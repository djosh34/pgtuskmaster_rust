
services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.21
    command:
      - /usr/local/bin/etcd
      - --name=etcd
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd=http://etcd:2380
      - --initial-cluster-state=new
    healthcheck:
      test:
        [
          "CMD",
          "/usr/local/bin/etcdctl",
          "--endpoints=http://127.0.0.1:2379",
          "endpoint",
          "health",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - ha
    volumes:
      - etcd-data:/etcd-data

  node-a:
    hostname: node-a
    extends:
      file: ./docker-compose.node.yml
      service: node
    ports:
      - "18081:8443"
      - "15001:5432"
    configs:
      - source: node-a-runtime
        target: /etc/pgtuskmaster/runtime.toml
      - source: node-a-cert
        target: /etc/pgtuskmaster/certs/node-a/tls.crt
    secrets:
      - source: node-a-key
        target: /etc/pgtuskmaster/certs/node-a/tls.key
    volumes:
      - node-a-data:/var/lib/postgresql


  node-b:
    hostname: node-b
    extends:
      file: ./docker-compose.node.yml
      service: node
    ports:
      - "18082:8443"
      - "15002:5432"
    configs:
      - source: node-b-runtime
        target: /etc/pgtuskmaster/runtime.toml
      - source: node-b-cert
        target: /etc/pgtuskmaster/certs/node-b/tls.crt
    secrets:
      - source: node-b-key
        target: /etc/pgtuskmaster/certs/node-b/tls.key
    volumes:
      - node-b-data:/var/lib/postgresql

  node-c:
    hostname: node-c
    extends:
      file: ./docker-compose.node.yml
      service: node
    ports:
      - "18083:8443"
      - "15003:5432"
    configs:
      - source: node-c-runtime
        target: /etc/pgtuskmaster/runtime.toml
      - source: node-c-cert
        target: /etc/pgtuskmaster/certs/node-c/tls.crt
    secrets:
      - source: node-c-key
        target: /etc/pgtuskmaster/certs/node-c/tls.key
    volumes:
      - node-c-data:/var/lib/postgresql

networks:
  ha:
    driver: bridge

volumes:
  etcd-data:
  node-a-data:
  node-b-data:
  node-c-data:

configs:
  node-a-runtime:
    file: ./node-a.toml
  node-b-runtime:
    file: ./node-b.toml
  node-c-runtime:
    file: ./node-c.toml
  pg-hba:
    file: ./pg/pg_hba.conf
  pg-ident:
    file: ./pg/pg_ident.conf
  ca-cert:
    file: ./certs/ca.crt
  node-a-cert:
    file: ./certs/node-a/tls.crt
  node-b-cert:
    file: ./certs/node-b/tls.crt
  node-c-cert:
    file: ./certs/node-c/tls.crt
  pgtm-client-cert:
    file: ./certs/pgtm-client/tls.crt

secrets:
  api-admin-token:
    file: ./secrets/api-admin-token
  api-read-token:
    file: ./secrets/api-read-token
  postgres-superuser-password:
    file: ./secrets/postgres-superuser-password
  replicator-password:
    file: ./secrets/replicator-password
  rewinder-password:
    file: ./secrets/rewinder-password
  node-a-key:
    file: ./certs/node-a/tls.key
  node-b-key:
    file: ./certs/node-b/tls.key
  node-c-key:
    file: ./certs/node-c/tls.key
  pgtm-client-key:
    file: ./certs/pgtm-client/tls.key
