[cluster]
name = "local-docker"
member_id = "node-a"

[postgres]
data_dir = "/var/lib/postgresql/data"
listen_host = "node-a"
listen_port = 5432
socket_dir = "/var/lib/pgtuskmaster/socket"
log_file = "/var/log/pgtuskmaster/postgres.log"
local_conn_identity = { user = "postgres", dbname = "postgres", ssl_mode = "disable" }
rewind_conn_identity = { user = "rewinder", dbname = "postgres", ssl_mode = "verify-full", ca_cert = { path = "/etc/pgtuskmaster/certs/ca.crt" } }
tls = { mode = "required", identity = { cert_chain = { path = "/etc/pgtuskmaster/certs/node-a/tls.crt" }, private_key = { path = "/etc/pgtuskmaster/certs/node-a/tls.key" } }, client_auth = { client_ca = { path = "/etc/pgtuskmaster/certs/ca.crt" }, require_client_cert = false } }
pg_hba = { source = { path = "/etc/pgtuskmaster/pg/pg_hba.conf" } }
pg_ident = { source = { path = "/etc/pgtuskmaster/pg/pg_ident.conf" } }

[postgres.extra_gucs]
wal_keep_size = "128MB"

[postgres.roles.superuser]
username = "postgres"
auth = { type = "password", password = { path = "/etc/pgtuskmaster/secrets/postgres-superuser-password" } }

[postgres.roles.replicator]
username = "replicator"
auth = { type = "password", password = { path = "/etc/pgtuskmaster/secrets/replicator-password" } }

[postgres.roles.rewinder]
username = "rewinder"
auth = { type = "password", password = { path = "/etc/pgtuskmaster/secrets/rewinder-password" } }

[dcs]
endpoints = ["http://etcd:2379"]
scope = "local-docker"

[ha]
loop_interval_ms = 1000
lease_ttl_ms = 10000

[process]
pg_rewind_timeout_ms = 120000
bootstrap_timeout_ms = 300000
fencing_timeout_ms = 30000

[process.binaries]
postgres = "/usr/lib/postgresql/16/bin/postgres"
pg_ctl = "/usr/lib/postgresql/16/bin/pg_ctl"
pg_rewind = "/usr/lib/postgresql/16/bin/pg_rewind"
initdb = "/usr/lib/postgresql/16/bin/initdb"
pg_basebackup = "/usr/lib/postgresql/16/bin/pg_basebackup"
psql = "/usr/lib/postgresql/16/bin/psql"

[logging]
level = "info"
capture_subprocess_output = true

[logging.postgres]
enabled = true
poll_interval_ms = 200
cleanup = { enabled = true, max_files = 20, max_age_seconds = 86400, protect_recent_seconds = 300 }

[logging.sinks.stderr]
enabled = true

[logging.sinks.file]
enabled = true
path = "/var/log/pgtuskmaster/runtime.jsonl"
mode = "append"

[api]
listen_addr = "0.0.0.0:8443"
security = { tls = { mode = "required", identity = { cert_chain = { path = "/etc/pgtuskmaster/certs/node-a/tls.crt" }, private_key = { path = "/etc/pgtuskmaster/certs/node-a/tls.key" } }, client_auth = { client_ca = { path = "/etc/pgtuskmaster/certs/ca.crt" }, require_client_cert = true } }, auth = { type = "role_tokens", read_token = { path = "/etc/pgtuskmaster/secrets/api-read-token" }, admin_token = { path = "/etc/pgtuskmaster/secrets/api-admin-token" } } }

[pgtm]
api_url = "https://node-a:8443"

[pgtm.api_client]
ca_cert = { path = "/etc/pgtuskmaster/certs/ca.crt" }
client_cert = { path = "/etc/pgtuskmaster/certs/node-a/tls.crt" }
client_key = { path = "/etc/pgtuskmaster/certs/node-a/tls.key" }

[pgtm.postgres_client]
ca_cert = { path = "/etc/pgtuskmaster/certs/ca.crt" }
client_cert = { path = "/etc/pgtuskmaster/certs/pgtm-client/tls.crt" }
client_key = { path = "/etc/pgtuskmaster/certs/pgtm-client/tls.key" }

[debug]
enabled = true
