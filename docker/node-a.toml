[cluster]
name = "local-docker"
scope = "local-docker"
member_id = "node-a"

[postgres]
local_database = "postgres"
tls = { mode = "enabled", identity = { cert_chain = { path = "/etc/pgtuskmaster/certs/node-a/tls.crt" }, private_key = { path = "/etc/pgtuskmaster/certs/node-a/tls.key" } }, client_auth = { client_ca = { path = "/etc/pgtuskmaster/certs/ca.crt" }, client_certificate = "optional" } }

[postgres.paths]
data_dir = "/var/lib/postgresql/data"
socket_dir = "/var/lib/pgtuskmaster/socket"
log_file = "/var/log/pgtuskmaster/postgres.log"

[postgres.network]
listen_host = "node-a"
listen_port = 5432

[postgres.rewind]
database = "postgres"

[postgres.rewind.transport]
ssl_mode = "verify-full"
ca_cert = { path = "/etc/pgtuskmaster/certs/ca.crt" }

[postgres.extra_gucs]
wal_keep_size = "128MB"

[postgres.roles.superuser]
username = "postgres"
auth = { type = "password", password = { path = "/etc/pgtuskmaster/secrets/postgres-superuser-password" } }

[postgres.roles.replicator]
username = "replicator"
auth = { type = "password", password = { path = "/etc/pgtuskmaster/secrets/replicator-password" } }

[postgres.roles.rewinder]
username = "rewinder"
auth = { type = "password", password = { path = "/etc/pgtuskmaster/secrets/rewinder-password" } }

[postgres.access]
hba = { path = "/etc/pgtuskmaster/pg/pg_hba.conf" }
ident = { path = "/etc/pgtuskmaster/pg/pg_ident.conf" }

[dcs]
endpoints = ["http://etcd:2379"]

[ha]
loop_interval_ms = 1000
lease_ttl_ms = 10000

[process.timeouts]
pg_rewind_ms = 120000
bootstrap_ms = 300000
fencing_ms = 30000

[process.binaries.overrides]
postgres = "/usr/lib/postgresql/16/bin/postgres"
pg_ctl = "/usr/lib/postgresql/16/bin/pg_ctl"
pg_rewind = "/usr/lib/postgresql/16/bin/pg_rewind"
initdb = "/usr/lib/postgresql/16/bin/initdb"
pg_basebackup = "/usr/lib/postgresql/16/bin/pg_basebackup"
psql = "/usr/lib/postgresql/16/bin/psql"

[logging]
level = "info"
capture_subprocess_output = true

[logging.postgres]
enabled = true
poll_interval_ms = 200
cleanup = { enabled = true, max_files = 20, max_age_seconds = 86400, protect_recent_seconds = 300 }

[logging.sinks.stderr]
enabled = true

[logging.sinks.file]
enabled = true
path = "/var/log/pgtuskmaster/runtime.jsonl"
mode = "append"

[api]
listen_addr = "0.0.0.0:8443"
transport = { transport = "https", tls = { identity = { cert_chain = { path = "/etc/pgtuskmaster/certs/node-a/tls.crt" }, private_key = { path = "/etc/pgtuskmaster/certs/node-a/tls.key" } }, client_auth = { client_certificate = "required", client_ca = { path = "/etc/pgtuskmaster/certs/ca.crt" } } } }
auth = { type = "role_tokens", read_token = { path = "/etc/pgtuskmaster/secrets/api-read-token" }, admin_token = { path = "/etc/pgtuskmaster/secrets/api-admin-token" } }

[pgtm.api]
base_url = "https://127.0.0.1:8443"
advertised_url = "https://node-a:8443"
expected_transport = "https"
auth = { type = "role_tokens", read_token = { path = "/etc/pgtuskmaster/secrets/api-read-token" }, admin_token = { path = "/etc/pgtuskmaster/secrets/api-admin-token" } }

[pgtm.api.tls]
ca_cert = { path = "/etc/pgtuskmaster/certs/ca.crt" }
identity = { cert = { path = "/etc/pgtuskmaster/certs/node-a/tls.crt" }, key = { path = "/etc/pgtuskmaster/certs/node-a/tls.key" } }

[pgtm.postgres.tls]
ca_cert = { path = "/etc/pgtuskmaster/certs/ca.crt" }
identity = { cert = { path = "/etc/pgtuskmaster/certs/pgtm-client/tls.crt" }, key = { path = "/etc/pgtuskmaster/certs/pgtm-client/tls.key" } }

[debug]
enabled = true
